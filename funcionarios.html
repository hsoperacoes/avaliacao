<!DOCTYPE html>
<html lang="pt-BR">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width,initial-scale=1" name="viewport"/>
  <title>
   Lista de Funcionários
  </title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
   :root {
  --navy:#071a45;
  --bg:#edf2f7;
  --card:#fff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#dbe3ef;
  --green:#16a34a;
  --red:#dc2626;
  --blue:#2563eb;
  --amber:#f59e0b;
  --shadow:0 10px 30px rgba(15,23,42,.08)
}
* {
  box-sizing:border-box
}
body {
  font-family:Arial,Segoe UI,sans-serif;
  background:var(--bg);
  color:var(--text);
  margin:0;
  min-height:100vh
}
.top {
  background:linear-gradient(90deg,#020817,#0f172a,#020617);
  color:#fff;
  padding:22px 26px
}
.top h1 {
  margin:0;
  font-size:28px
}
.top p {
  margin:6px 0 0;
  color:#cbd5e1
}
.wrap {
  max-width:1180px;
  margin:24px auto;
  padding:0 16px
}
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:22px;
  box-shadow:var(--shadow);
  padding:22px;
  margin-bottom:16px
}
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:14px
}
.btn {
  border:0;
  border-radius:14px;
  padding:12px 18px;
  font-weight:800;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  background:var(--navy);
  color:#fff
}
.btn:hover {
  filter:brightness(1.06)
}
.btn.secondary {
  background:#64748b
}
.btn.green {
  background:var(--green)
}
.btn.red {
  background:var(--red)
}
.btn.blue {
  background:var(--blue)
}
.row {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center
}
.muted {
  color:var(--muted);
  font-size:14px;
  line-height:1.45
}
label {
  font-size:13px;
  font-weight:900;
  text-transform:uppercase;
  color:#334155;
  display:block;
  margin:12px 0 6px
}
input,select,textarea {
  width:100%;
  padding:13px 14px;
  border:1px solid var(--border);
  border-radius:14px;
  background:#fff;
  font-size:14px;
  outline:none
}
textarea {
  min-height:90px;
  resize:vertical
}
input:focus,select:focus,textarea:focus {
  border-color:var(--blue);
  box-shadow:0 0 0 4px rgba(37,99,235,.12)
}
.nav {
  margin-top:14px
}
.toast {
  position:fixed;
  right:18px;
  bottom:18px;
  background:#0f172a;
  color:#fff;
  padding:14px 16px;
  border-radius:14px;
  box-shadow:var(--shadow);
  display:none;
  z-index:9999
}
.toast.show {
  display:block
}
.role-gate {
  position:fixed;
  inset:0;
  background:rgba(2,6,23,.92);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99999;
  padding:20px
}
.role-box {
  width:min(520px,94vw);
  background:#fff;
  border-radius:26px;
  padding:26px;
  box-shadow:0 24px 80px rgba(0,0,0,.38)
}
.role-box h2 {
  margin:0 0 8px;
  color:var(--navy)
}
.role-pill {
  padding:14px;
  border-radius:16px;
  border:1px solid var(--border);
  background:#f8fafc;
  cursor:pointer;
  font-weight:900;
  text-align:center
}
.role-pill:hover {
  background:#dbeafe;
  border-color:#93c5fd
}
.badge {
  display:inline-flex;
  padding:7px 11px;
  border-radius:999px;
  background:#e2e8f0;
  color:#334155;
  font-size:12px;
  font-weight:900
}
.badge.green {
  background:#dcfce7;
  color:#166534
}
.badge.amber {
  background:#fef3c7;
  color:#92400e
}
.hidden {
  display:none!important
}
@media(max-width:700px) {
  .top h1 {
    font-size:22px
  }
  .wrap {
    margin:14px auto
  }
  .card {
    padding:16px
  }
  
}
.emp {
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
  border-bottom:1px solid var(--border);
  padding:14px 0
}
.emp:last-child {
  border-bottom:none
}
dialog {
  border:0;
  border-radius:24px;
  box-shadow:0 24px 80px rgba(0,0,0,.28);
  max-width:620px;
  width:94vw
}
dialog::backdrop {
  background:rgba(2,6,23,.65)
}
  </style>
 </head>
 <body>
  <div class="role-gate" id="roleGate">
   <div class="role-box">
    <h2>
     Selecione o cargo
    </h2>
    <p class="muted">
     Essa informação será usada em todo o processo e vai alterar o passo a passo do onboarding.
    </p>
    <div class="grid" style="margin-top:16px">
     <button class="role-pill" onclick="escolherCargo('VENDEDOR')">
      VENDEDOR
     </button>
     <button class="role-pill" onclick="escolherCargo('CAIXA')">
      CAIXA
     </button>
     <button class="role-pill" onclick="escolherCargo('ESTOQUISTA')">
      ESTOQUISTA
     </button>
    </div>
   </div>
  </div>
  <div class="top">
   <h1>
    LISTA DE FUNCIONÁRIOS
   </h1>
   <p>
    Gestão de onboarding — cargo selecionado:
    <b data-cargo-label="">
     —
    </b>
   </p>
   <div class="nav row">
    <a class="btn secondary" href="home.html">
     Home
    </a>
    <button class="btn green" onclick="openAdd()">
     Adicionar Funcionário
    </button>
    <button class="btn secondary" onclick="loadEmployees()">
     Sincronizar
    </button>
    <button class="btn secondary" onclick="trocarCargo()">
     Trocar Cargo
    </button>
   </div>
  </div>
  <main class="wrap">
   <section class="card">
    <div class="row">
     <select id="statusFilter" onchange="render()">
      <option value="">
       Todos os status
      </option>
      <option value="pending">
       Pendente
      </option>
      <option value="in-progress">
       Em andamento
      </option>
      <option value="completed">
       Concluído
      </option>
     </select>
    </div>
    <div id="list" style="margin-top:12px">
    </div>
   </section>
  </main>
  <dialog id="addDialog">
   <form id="addForm">
    <h2>
     Adicionar Funcionário
    </h2>
    <div class="grid">
     <div>
      <label>
       Nome Completo *
      </label>
      <input id="employeeName" required=""/>
     </div>
     <div>
      <label>
       Cargo *
      </label>
      <input id="employeePosition" readonly="" required=""/>
     </div>
     <div>
      <label>
       Data de Início *
      </label>
      <input id="employeeStartDate" required="" type="date"/>
     </div>
     <div>
      <label>
       Gerente Responsável *
      </label>
      <input id="employeeManager" required=""/>
     </div>
     <div>
      <label>
       E-mail
      </label>
      <input id="employeeEmail" type="email"/>
     </div>
    </div>
    <div class="row" style="margin-top:18px">
     <button class="btn green" type="submit">
      Salvar Funcionário
     </button>
     <button class="btn secondary" onclick="addDialog.close()" type="button">
      Cancelar
     </button>
    </div>
   </form>
  </dialog>
  <div class="toast" id="toast">
   Mensagem
  </div>
  <script>
   const CARGOS_VALIDOS=['VENDEDOR','CAIXA','ESTOQUISTA'];
function normalizarCargo(v) {
  v=String(v||'').trim().toUpperCase();
  if(v==='VENDEDORA')v='VENDEDOR';
  if(v==='ESTOQUE')v='ESTOQUISTA';
  return CARGOS_VALIDOS.includes(v)?v:''
}
function getCargoSelecionado() {
  const p=new URLSearchParams(location.search);
  return normalizarCargo(p.get('cargo'))||normalizarCargo(localStorage.getItem('hs_cargo_selecionado'))
}
function setCargoSelecionado(c) {
  c=normalizarCargo(c);
  if(!c)return;
  localStorage.setItem('hs_cargo_selecionado',c);
  document.querySelectorAll('[data-cargo-label]').forEach(el=>el.textContent=c);
  document.querySelectorAll('input[name="funcao_prevista"],#funcao_prevista,#employeePosition').forEach(el=> {
    if(el)el.value=c
  });
  
}
function aplicarCargoNosLinks() {
  const c=getCargoSelecionado();
  document.querySelectorAll('a[href$=".html"],a[href*=".html?"]').forEach(a=> {
    try {
      const u=new URL(a.getAttribute('href'),location.href);if(c)u.searchParams.set('cargo',c);a.setAttribute('href',u.pathname.split('/').pop()+u.search)
    }
    catch(e) {
      
    }
    
  })
}
function exigirCargo() {
  let c=getCargoSelecionado();
  if(c) {
    setCargoSelecionado(c);
    aplicarCargoNosLinks();
    return c
  }
  const gate=document.getElementById('roleGate');
  if(gate)gate.style.display='flex';
  return ''
}
function escolherCargo(c) {
  setCargoSelecionado(c);
  const gate=document.getElementById('roleGate');
  if(gate)gate.style.display='none';
  aplicarCargoNosLinks();
  if(typeof onCargoChanged==='function')onCargoChanged(c)
}
function trocarCargo() {
  localStorage.removeItem('hs_cargo_selecionado');
  const gate=document.getElementById('roleGate');
  if(gate)gate.style.display='flex'
}
function toast(msg) {
  const t=document.getElementById('toast');
  if(!t) {
    alert(msg);
    return
  }
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600)
}
const GAS_WEB_APP_URL='https://script.google.com/macros/s/AKfycbzx7fZB5WPpdAI7nUADWhzWZF83CyTKIl50jkOeJanoPao9t1eecOQ5CrshZksO5A5e/exec';
let employees=[];
function pct(e) {
  return Math.max(Number(e.progressPct||0),Number(e.progress||0))
}
function statusText(s) {
  return {
    'pending':'Pendente','in-progress':'Em andamento','completed':'Concluído','archived':'Arquivado'
  }
  [s]||s||'Pendente'
}
function esc(s) {
  return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}async function loadEmployees(){document.getElementById('list').innerHTML='<p class="muted">Carregando funcionários…</p>';try{const r=await fetch(GAS_WEB_APP_URL+'?type=employees-list&include_archived=false&_='+Date.now(),{cache:'no-store'});const out=await r.json();employees=(out.items||out.employees||[]).filter(e=>String(e.status||'').toLowerCase()!=='archived');localStorage.setItem('employees_sync',JSON.stringify(employees));}catch(e){employees=JSON.parse(localStorage.getItem('employees_sync')||'[]');toast('Sem backend. Carregado do dispositivo.')}render()}function render(){const f=document.getElementById('statusFilter').value;let arr=employees;if(f)arr=arr.filter(e=>(e.status||'pending')===f);const box=document.getElementById('list');if(!arr.length){box.innerHTML='<div class="card" style="box-shadow:none"><h3>Nenhum funcionário encontrado</h3><p class="muted">Adicione funcionários aprovados para começar o processo de onboarding.</p></div>';return}box.innerHTML=arr.map(e=>{const id=e.employeeId||e.id;const p=pct(e);const st=e.status||(p>=100?'completed':p>0?'in-progress':'pending');return `<div class="emp"><div><b>${esc(e.name)}</b><div class="muted">Cargo: ${esc(e.position)} | Gerente: ${esc(e.manager)} | Progresso: ${p}%</div><span class="badge $ {
    st==='completed'?'green':'amber'
  }
  ">${statusText(st)}</span></div><div class="row"><button class="btn blue" onclick="startOnboarding('${id}')">Onboarding</button><button class="btn secondary" onclick="details('${id}')">Detalhes</button></div></div>`}).join('')}function openAdd(){setCargoSelecionado(getCargoSelecionado());document.getElementById('employeeStartDate').value=new Date().toISOString().slice(0,10);addDialog.showModal()}document.getElementById('addForm').addEventListener('submit',async e=>{e.preventDefault();const c=getCargoSelecionado();const record={id:'emp-'+Date.now(),name:employeeName.value.trim(),position:c,startDate:employeeStartDate.value,manager:employeeManager.value.trim(),email:employeeEmail.value.trim(),status:'pending',progress:0,locked:'no'};try{const r=await fetch(GAS_WEB_APP_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({type:'employees-upsert',record})});const out=await r.json();if(!out.ok)throw new Error(out.error||'Erro ao salvar');record.employeeId=out.employeeId||record.id;employees.push(record);localStorage.setItem('employees_sync',JSON.stringify(employees));render();addDialog.close();toast('Funcionário salvo.')}catch(err){employees.push(record);localStorage.setItem('employees_sync',JSON.stringify(employees));render();addDialog.close();toast('Salvo localmente.')}});function startOnboarding(id){const emp=employees.find(e=>(e.employeeId||e.id)===id);if(!emp)return;localStorage.setItem('currentEmployee',JSON.stringify({id:id,name:emp.name,position:emp.position,startDate:emp.startDate,manager:emp.manager,email:emp.email,progress:pct(emp)}));setCargoSelecionado(emp.position||getCargoSelecionado());location.href='onboarding.html?cargo='+encodeURIComponent(getCargoSelecionado())}function details(id){const e=employees.find(x=>(x.employeeId||x.id)===id);if(e)alert(`Nome: ${e.name}\nCargo: ${e.position}\nGerente: ${e.manager}\nProgresso: ${pct(e)}%`)}function onCargoChanged(c){const el=document.getElementById('employeePosition');if(el)el.value=c}document.addEventListener('DOMContentLoaded',()=>{const c=exigirCargo();if(c)onCargoChanged(c);loadEmployees()});
  </script>
 </body>
</html>
